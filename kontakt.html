<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Boutique Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Hotel Paradiso</h1>
        <nav>
            <a href="index.html">Startseite</a>
            <a href="zimmer.html">Zimmer & Suiten</a>
            <a href="kontakt.html">Kontakt</a>
        </nav>
    </header>

    <main>
        <section class="kontakt-bereich">
            <h2 class="bereichs-titel">Wir freuen uns auf Sie</h2>

            <div class="kontakt-container">

                <form class="hotel-formular" name="hotel-kontakt" data-netlify="true">
                    <input type="text" name="name" placeholder="Ihr Name" required>
                    <input type="email" name="email" placeholder="Ihre E-Mail" required>
                    <textarea name="nachricht" rows="6" placeholder="Ihre Buchungsanfrage oder Nachricht" required></textarea>
                    <button type="submit" class="btn">Nachricht senden</button>
                </form>

                <div class="karten-box">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2662.062013892795!2d8.53754931564619!3d47.37688657917024!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47900a08bd4563e5%3A0x60d16c5b045e7709!2sZ%C3%BCrich%2C%20Schweiz!5e0!3m2!1sde!2sde!4v1680000000000!5m2!1sde!2sde" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

            </div>
        </section>
    </main>

</body>
</html>
